name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
  # Node 20 is deprecated on GitHub Actions runners. Allow it temporarily
  # so the minimum-supported-version job can still run. Remove this and
  # the 20.x matrix entry once Node 20 is fully EOL.
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  build:
    name: build (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # 20.x = minimum supported, 22.x = active LTS, 24.x = current.
        node: ['20.18.0', '22.11.0', '24.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build

      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.node == '24.x'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            packages/*/dist
            !packages/*/dist/**/*.tsbuildinfo
          retention-days: 7
          if-no-files-found: ignore

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test with coverage
        run: pnpm -r test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: packages/*/coverage
          fail_ci_if_error: false

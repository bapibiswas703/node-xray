name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: 0

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    # `id-token: write` is REQUIRED for npm provenance. The OIDC token
    # is exchanged with sigstore to produce the SLSA provenance
    # attestation that npm attaches to each published package.
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Create GitHub release (if version changed)
        id: create_release
        uses: changesets/action@v1
        with:
          version: pnpm version
          commit: 'chore: version packages'
          title: 'chore: version packages'
          publish: pnpm release
        # `env` must be a sibling of `uses`/`with` — nested inside
        # `with` it makes the workflow file invalid, and every run
        # fails at startup in 0s before any job appears.
        # `changesets/action@v1` only checks `process.env.NPM_TOKEN`
        # (see v1/src/index.ts — it does NOT fall back to
        # `NODE_AUTH_TOKEN`). Without `NPM_TOKEN` it falls through to
        # OIDC, which on this account still requires OTP because
        # trusted publishing is not configured per-package on
        # npmjs.com. The publish step then fails with EOTP.
        # Setting both: the action writes NPM_TOKEN to ~/.npmrc,
        # npm also accepts NODE_AUTH_TOKEN as a documented fallback.
        # The secret must be a non-2FA token (a legacy Automation
        # token, or a new Granular Access Token with
        # "Bypass 2FA" enabled) — a 2FA-bound user token will still
        # throw EOTP.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

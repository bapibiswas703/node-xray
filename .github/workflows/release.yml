name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: 0

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    # `id-token: write` is REQUIRED for npm provenance. The OIDC token
    # is exchanged with sigstore to produce the SLSA provenance
    # attestation that npm attaches to each published package.
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Consume changesets and commit version bump
        id: version
        run: |
          # pnpm changeset version consumes .changeset/*.md, bumps
          # package.json versions, and writes CHANGELOG entries.
          pnpm changeset version

          # If nothing changed (no .changeset/*.md files), skip the
          # rest — no packages to publish.
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changesets to consume — nothing to publish."
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

          # Commit the version bump directly to main.  We do not
          # create a separate PR — the version bump is a mechanical
          # consequence of the merged changeset PR and does not
          # need its own review cycle.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: pnpm release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
